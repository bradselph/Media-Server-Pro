openapi: 3.0.3
info:
  title: Media Server Pro 4 API
  description: |
    Complete API specification for Media Server Pro 4 - A modular media streaming server with HLS adaptive streaming, user authentication, analytics, and admin panel.

    ## Base URL
    All API endpoints are relative to the server's base URL (e.g., `http://localhost:8080`)

    ## Authentication
    - **Session Auth**: Uses `session_id` cookie for regular users
    - **Admin Auth**: Uses `admin_session` cookie for administrators
    - Cookies are HttpOnly and SameSite=Lax

    ## Response Format
    All API responses follow this envelope format:
    ```json
    {
      "success": true|false,
      "data": {...},
      "error": "string (only if success=false)"
    }
    ```
  # TODO: The OpenAPI spec covers approximately 40 endpoints but api/routes/routes.go
  # registers approximately 130+ endpoints. The following categories of routes are
  # entirely undocumented in this spec:
  #
  # Missing admin endpoints (~70 routes): /api/admin/stats, /api/admin/system,
  # /api/admin/cache/clear, /api/admin/server/restart, /api/admin/server/shutdown,
  # /api/admin/update/*, /api/admin/version, /api/admin/users (CRUD),
  # /api/admin/audit-log, /api/admin/logs, /api/admin/analytics/export,
  # /api/admin/config, /api/admin/tasks/*, /api/admin/playlists/*,
  # /api/admin/media/*, /api/admin/backups/*, /api/admin/scanner/*,
  # /api/admin/thumbnails/*, /api/admin/hls/*, /api/admin/validator/*,
  # /api/admin/database/*, /api/admin/discovery/*, /api/admin/security/*,
  # /api/admin/categorizer/*, /api/admin/remote/*, /api/admin/suggestions/stats.
  #
  # Missing public endpoints (~20 routes): GET /api/media/version,
  # GET /metrics, GET /api/suggestions/trending, GET /api/suggestions/similar,
  # GET /api/suggestions/continue, GET /api/suggestions/personalized,
  # POST /api/ratings, GET /api/upload/{id}/progress, GET /thumbnails/{filename},
  # GET /api/analytics/daily, GET /api/analytics/top, GET /api/analytics/events/*,
  # GET /remote/stream.
  #
  # Related: api/routes/routes.go for the complete route registration.
  version: 3.1.0
  contact:
    name: Media Server Pro Support
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Development server
  - url: https://your-server.com
    description: Production server

tags:
  - name: Authentication
    description: User and admin authentication endpoints
  - name: Media
    description: Media library and streaming endpoints
  - name: HLS
    description: HLS adaptive streaming endpoints
  - name: Preferences
    description: User preferences and settings
  - name: Watch History
    description: Track and retrieve watch history
  - name: Playlists
    description: Playlist management
  - name: Analytics
    description: Usage analytics and statistics
  - name: Suggestions
    description: Content recommendations
  - name: Thumbnails
    description: Thumbnail generation and serving
  - name: System
    description: System information and settings
  - name: Upload
    description: Media file uploads
  - name: Admin
    description: Administrative endpoints

paths:
  /api/auth/login:
    post:
      tags: [ Authentication ]
      summary: Authenticate user or admin
      description: Login endpoint for both regular users and administrators. Sets session cookie on success.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ username, password ]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 64
                password:
                  type: string
                  format: password
                  minLength: 6
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: Session cookie (session_id or admin_session)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'

  /api/auth/logout:
    post:
      tags: [ Authentication ]
      summary: Logout current user
      description: Clears session cookies and invalidates session
      operationId: logout
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/auth/register:
    post:
      tags: [ Authentication ]
      summary: Register new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ username, password ]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 64
                  pattern: '^[a-zA-Z0-9_-]+$'
                  description: Alphanumeric, underscore, and hyphen only
                password:
                  type: string
                  format: password
                  minLength: 6
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user_id:
                            type: string
                          session_id:
                            type: string
        '400':
          $ref: '#/components/responses/BadRequestError'

  /api/auth/session:
    get:
      tags: [ Authentication ]
      summary: Check session validity
      description: Returns current authentication status
      operationId: checkSession
      responses:
        '200':
          description: Session status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          authenticated:
                            type: boolean
                          user_id:
                            type: string
                          username:
                            type: string
                          expires_at:
                            type: string
                            format: date-time

  /api/auth/me:
    get:
      tags: [ Authentication ]
      summary: Get current user information
      operationId: getCurrentUser
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/auth/change-password:
    post:
      tags: [ Authentication ]
      summary: Change user password
      operationId: changePassword
      security:
        - sessionAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ current_password, new_password ]
              properties:
                current_password:
                  type: string
                  format: password
                new_password:
                  type: string
                  format: password
                  minLength: 6
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/media:
    get:
      tags: [ Media ]
      summary: List media with pagination and filtering
      description: Returns paginated list of media items with optional filtering by type, category, and search
      operationId: listMedia
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 48
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          schema:
            type: string
            enum: [ date, name, size, duration, views ]
            default: date
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [ asc, desc ]
            default: desc
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [ all, video, audio ]
            default: all
      responses:
        '200':
          description: Media list with pagination
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/MediaItem'
                          total_items:
                            type: integer
                          total_pages:
                            type: integer

  /api/media/{id}:
    get:
      tags: [ Media ]
      summary: Get specific media item
      operationId: getMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media item details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MediaItem'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/media/stats:
    get:
      tags: [ Media ]
      summary: Get media library statistics
      operationId: getMediaStats
      responses:
        '200':
          description: Library statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_count:
                            type: integer
                          video_count:
                            type: integer
                          audio_count:
                            type: integer
                          total_size:
                            type: integer
                            format: int64
                          last_scan:
                            type: string
                            format: date-time

  /api/media/categories:
    get:
      tags: [ Media ]
      summary: Get available categories
      operationId: getCategories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: string

  /media:
    get:
      tags: [ Media ]
      summary: Stream media file
      description: Binary media streaming with Range support (NOT under /api prefix)
      operationId: streamMedia
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Media file path
      responses:
        '200':
          description: Media stream
          content:
            video/*:
              schema:
                type: string
                format: binary
            audio/*:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content (Range request)
        '404':
          $ref: '#/components/responses/NotFoundError'

  /download:
    get:
      tags: [ Media ]
      summary: Download media file
      operationId: downloadMedia
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/playback:
    post:
      tags: [ Media ]
      summary: Track playback for analytics
      operationId: trackPlayback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ media_path, position, duration ]
              properties:
                media_path:
                  type: string
                position:
                  type: number
                  format: float
                duration:
                  type: number
                  format: float
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/hls/capabilities:
    get:
      tags: [ HLS ]
      summary: Check HLS transcoding capabilities
      operationId: getHLSCapabilities
      responses:
        '200':
          description: HLS capabilities
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          enabled:
                            type: boolean
                          ffmpeg_available:
                            type: boolean
                          qualities:
                            type: array
                            items:
                              type: string
                              enum: [ 480p, 720p, 1080p ]

  /api/hls/check:
    get:
      tags: [ HLS ]
      summary: Check HLS availability
      description: Check if HLS stream exists or generate if configured
      operationId: checkHLSAvailability
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS availability status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSJob'

  /api/hls/generate:
    post:
      tags: [ HLS ]
      summary: Generate HLS stream
      operationId: generateHLS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ path ]
              properties:
                path:
                  type: string
                qualities:
                  type: array
                  items:
                    type: string
                    enum: [ 480p, 720p, 1080p ]
      responses:
        '200':
          description: HLS generation started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - $ref: '#/components/schemas/HLSJob'
                          - type: object
                            properties:
                              job_id:
                                type: string

  /api/hls/status/{id}:
    get:
      tags: [ HLS ]
      summary: Get HLS generation status
      operationId: getHLSStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSJob'

  /hls/{id}/master.m3u8:
    get:
      tags: [ HLS ]
      summary: Serve HLS master playlist
      operationId: serveMasterPlaylist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /hls/{id}/{quality}/playlist.m3u8:
    get:
      tags: [ HLS ]
      summary: Serve HLS variant playlist
      operationId: serveVariantPlaylist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
            enum: [ 480p, 720p, 1080p ]
      responses:
        '200':
          description: HLS variant playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /hls/{id}/{quality}/{segment}:
    get:
      tags: [ HLS ]
      summary: Serve HLS segment
      operationId: serveSegment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS segment
          content:
            video/MP2T:
              schema:
                type: string
                format: binary

  /api/preferences:
    get:
      tags: [ Preferences ]
      summary: Get user preferences
      operationId: getPreferences
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserPreferences'
    post:
      tags: [ Preferences ]
      summary: Update user preferences
      operationId: updatePreferences
      security:
        - sessionAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/permissions:
    get:
      tags: [ Preferences ]
      summary: Get user permissions
      description: Returns different permissions based on authentication status
      operationId: getPermissions
      responses:
        '200':
          description: User permissions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserPermissions'

  /api/watch-history:
    get:
      tags: [ Watch History ]
      summary: Get watch history
      operationId: getWatchHistory
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: Watch history entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WatchHistoryEntry'
    post:
      tags: [ Watch History ]
      summary: Add watch history entry
      operationId: addToWatchHistory
      security:
        - sessionAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ media_path, position, duration ]
              properties:
                media_path:
                  type: string
                position:
                  type: number
                duration:
                  type: number
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [ Watch History ]
      summary: Clear watch history
      operationId: clearWatchHistory
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/playlists:
    get:
      tags: [ Playlists ]
      summary: List user playlists
      operationId: listPlaylists
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: User playlists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Playlist'
    post:
      tags: [ Playlists ]
      summary: Create playlist
      operationId: createPlaylist
      security:
        - sessionAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ name ]
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Created playlist
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                          name:
                            type: string

  /api/playlists/{id}:
    get:
      tags: [ Playlists ]
      summary: Get playlist details
      operationId: getPlaylist
      security:
        - sessionAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Playlist'
    delete:
      tags: [ Playlists ]
      summary: Delete playlist
      operationId: deletePlaylist
      security:
        - sessionAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/playlists/{id}/items:
    post:
      tags: [ Playlists ]
      summary: Add item to playlist
      operationId: addPlaylistItem
      security:
        - sessionAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ media_path, title ]
              properties:
                media_path:
                  type: string
                title:
                  type: string
                path:
                  type: string
                  description: Alias for media_path (backward compatibility)
                name:
                  type: string
                  description: Alias for title (backward compatibility)
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [ Playlists ]
      summary: Remove item from playlist
      operationId: removePlaylistItem
      security:
        - sessionAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_path:
                  type: string
                path:
                  type: string
                  description: Alias for media_path
                item_id:
                  type: string
                  description: Alternative identifier
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/playlists/{id}/export:
    get:
      tags: [ Playlists ]
      summary: Export playlist
      operationId: exportPlaylist
      security:
        - sessionAuth: [ ]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [ json, m3u, m3u8 ]
            default: json
      responses:
        '200':
          description: Exported playlist file
          content:
            application/json:
              schema:
                type: object
            audio/x-mpegurl:
              schema:
                type: string

  /api/analytics:
    get:
      tags: [ Analytics ]
      summary: Get analytics summary
      operationId: getAnalyticsSummary
      security:
        - sessionAuth: [ ]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_views:
                            type: integer
                          total_watch_time:
                            type: number
                          unique_media:
                            type: integer

  /api/analytics/events:
    post:
      tags: [ Analytics ]
      summary: Submit analytics event
      operationId: submitEvent
      security:
        - sessionAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ event_type, media_path ]
              properties:
                event_type:
                  type: string
                media_path:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /api/suggestions:
    get:
      tags: [ Suggestions ]
      summary: Get content suggestions
      operationId: getSuggestions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Suggested media items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MediaItem'

  /thumbnail:
    get:
      tags: [ Thumbnails ]
      summary: Get or generate thumbnail
      operationId: getThumbnail
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [ placeholder, audio_placeholder, censored ]
      responses:
        '200':
          description: Thumbnail image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /api/thumbnails/previews:
    get:
      tags: [ Thumbnails ]
      summary: Get thumbnail preview frames
      operationId: getThumbnailPreviews
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview thumbnails
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          previews:
                            type: array
                            items:
                              type: string

  /api/server-settings:
    get:
      tags: [ System ]
      summary: Get server settings
      operationId: getServerSettings
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: Server settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          features:
                            type: object
                          ui:
                            type: object

  /api/storage-usage:
    get:
      tags: [ System ]
      summary: Get storage usage
      operationId: getStorageUsage
      security:
        - sessionAuth: [ ]
      responses:
        '200':
          description: Storage statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          total_bytes:
                            type: integer
                            format: int64
                          used_bytes:
                            type: integer
                            format: int64
                          available_bytes:
                            type: integer
                            format: int64
                          usage_percent:
                            type: number
                            format: float

  /health:
    get:
      tags: [ System ]
      summary: Server health check
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ healthy, degraded, unhealthy ]
                  modules:
                    type: object
                    additionalProperties:
                      type: string

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session_id
      description: Regular user session cookie
    adminAuth:
      type: apiKey
      in: cookie
      name: admin_session
      description: Administrator session cookie

  schemas:
    SuccessResponse:
      type: object
      required: [ success ]
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string

    MediaItem:
      type: object
      properties:
        path:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [ video, audio ]
        size:
          type: integer
          format: int64
        duration:
          type: number
          format: float
        views:
          type: integer
        date_modified:
          type: string
          format: date-time
        thumbnail_url:
          type: string
        category:
          type: string
        is_mature:
          type: boolean
        is_remote:
          type: boolean

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [ user, admin ]
        enabled:
          type: boolean
        permissions:
          $ref: '#/components/schemas/UserPermissions'
        preferences:
          $ref: '#/components/schemas/UserPreferences'

    UserPermissions:
      type: object
      properties:
        can_stream:
          type: boolean
        can_download:
          type: boolean
        can_upload:
          type: boolean
        can_delete:
          type: boolean
        can_manage:
          type: boolean
        can_view_mature:
          type: boolean
        can_create_playlists:
          type: boolean

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [ light, dark ]
        default_quality:
          type: string
          enum: [ auto, 480p, 720p, 1080p ]
        show_mature:
          type: boolean
        mature_preference_set:
          type: boolean
        sort_by:
          type: string
          enum: [ date, name, size, duration, views ]
        sort_order:
          type: string
          enum: [ asc, desc ]
        items_per_page:
          type: integer
        filter_category:
          type: string
        filter_media_type:
          type: string
          enum: [ all, video, audio ]

    WatchHistoryEntry:
      type: object
      properties:
        media_path:
          type: string
        position:
          type: number
        duration:
          type: number
        last_watched:
          type: string
          format: date-time

    Playlist:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/PlaylistItem'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PlaylistItem:
      type: object
      properties:
        media_path:
          type: string
        title:
          type: string
        added_at:
          type: string
          format: date-time

    HLSJob:
      type: object
      properties:
        id:
          type: string
        media_path:
          type: string
        status:
          type: string
          enum: [ pending, processing, completed, error ]
        progress:
          type: number
          format: float
          minimum: 0
          maximum: 1
        available:
          type: boolean
        hls_url:
          type: string
        qualities:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string

  responses:
    SuccessResponse:
      description: Operation successful
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'

    BadRequestError:
      description: Bad request
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    enum: [ false ]
                  error:
                    type: string

    UnauthorizedError:
      description: Unauthorized - authentication required
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    enum: [ false ]
                  error:
                    type: string
                    example: Unauthorized

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    enum: [ false ]
                  error:
                    type: string

    RateLimitError:
      description: Too many requests
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/SuccessResponse'
              - type: object
                properties:
                  success:
                    type: boolean
                    enum: [ false ]
                  error:
                    type: string
                    example: Too many requests