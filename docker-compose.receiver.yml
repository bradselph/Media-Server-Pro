# Media Server Pro — slave-only stack.
#
# Run this on a host that should ONLY act as a slave receiver (no master, no
# DB, no Nuxt UI) — for example, a second VPS that hosts the bulk of your
# media library and pushes its catalog to a master server elsewhere.
#
# Usage:
#   1. Copy .env.docker.example to .env.docker.receiver and edit:
#        MASTER_URL=https://master.example.com
#        RECEIVER_API_KEY=<key from master's admin panel>
#        SLAVE_ID, SLAVE_NAME, SCAN_INTERVAL, HEARTBEAT_INTERVAL (optional)
#   2. Bind-mount the host directories that hold your media into the
#      container at /data/videos and /data/music (see `volumes:` below).
#   3. docker compose -f docker-compose.receiver.yml --env-file .env.docker.receiver up -d
#
# The slave initiates ALL outbound connections to the master — no public
# port forwarding or inbound firewall rules are needed on this host.

name: media-server-pro-receiver

services:
  receiver:
    image: ghcr.io/bradselph/media-server-pro-receiver:${IMAGE_TAG:-main}
    build:
      context: .
      dockerfile: Dockerfile.media-receiver
      args:
        GO_VERSION: "${GO_VERSION:-1.26}"
        APP_UID:    "${APP_UID:-1000}"
        APP_GID:    "${APP_GID:-1000}"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      MASTER_URL:          "${MASTER_URL:?set MASTER_URL to the master server URL}"
      RECEIVER_API_KEY:    "${RECEIVER_API_KEY:?set RECEIVER_API_KEY to the master's receiver API key}"
      SLAVE_ID:            "${SLAVE_ID:-}"
      SLAVE_NAME:          "${SLAVE_NAME:-}"
      MEDIA_DIRS:          "/data/videos,/data/music"
      SCAN_INTERVAL:       "${SCAN_INTERVAL:-15m}"
      HEARTBEAT_INTERVAL:  "${HEARTBEAT_INTERVAL:-30s}"
      SLAVE_MAX_STREAMS:   "${SLAVE_MAX_STREAMS:-10}"
      TZ:                  "${TZ:-UTC}"
    volumes:
      # Bind-mount existing host paths that hold your media. Read-only is
      # safer because the slave never needs to write to media files; ffprobe
      # and the catalog scan only read.
      - "${VIDEOS_HOST_PATH:?set VIDEOS_HOST_PATH to the host directory holding your videos}:/data/videos:ro"
      - "${MUSIC_HOST_PATH:?set MUSIC_HOST_PATH to the host directory holding your music}:/data/music:ro"
