# Development overrides: mount local media directories instead of volumes.
# Copy this file to docker-compose.override.yml and adjust paths as needed.
# docker-compose.override.yml is loaded automatically by docker compose.

services:
  app:
    # Mount your actual local media directories for live access during dev.
    # Adjust the host-side paths (left of :) to match your local setup.
    volumes:
      - ./videos:/data/videos:ro
      - ./music:/data/music:ro
      - ./uploads:/data/uploads
      - ./thumbnails:/data/thumbnails
      - ./hls_cache:/data/hls_cache
      - ./data:/data/data
      - ./logs:/data/logs
      - ./playlists:/data/playlists
    environment:
      # Extra debug environment during local development
      LOG_LEVEL: debug
      GIN_MODE: debug
