services:
  # ─── MySQL database ──────────────────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mediaserver
      MYSQL_USER: mediaserver
      MYSQL_PASSWORD: mediapassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mediaserver", "-pmediapassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "3306:3306"   # Expose for local DB clients during development

  # ─── Media server application ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: dev
        BUILD_DATE: "local"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "8080:8080"
    volumes:
      - media_videos:/data/videos
      - media_music:/data/music
      - media_uploads:/data/uploads
      - media_thumbnails:/data/thumbnails
      - media_hls:/data/hls_cache
      - media_data:/data/data
      - media_logs:/data/logs
      - media_playlists:/data/playlists
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  db_data:
  media_videos:
  media_music:
  media_uploads:
  media_thumbnails:
  media_hls:
  media_data:
  media_logs:
  media_playlists:
