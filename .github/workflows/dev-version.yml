name: Dev Patch Version

on:
  push:
    branches: [ development ]
    paths-ignore:
      - 'VERSION'
      - 'CHANGELOG.md'

concurrency:
  group: dev-version-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump-patch:
    runs-on: [self-hosted, Linux, X64, media-server]
    if: "!contains(github.event.head_commit.message, '[auto-version]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # TODO: This workflow generates a dev build label but never commits it or
      # uses it anywhere. It only writes to GITHUB_OUTPUT and GITHUB_STEP_SUMMARY.
      # The label is not written to the VERSION file or used to tag. If the intent
      # is to update VERSION with the dev label, a commit step is missing. If this
      # is purely informational, consider whether the workflow is needed at all.
      - name: Generate dev build label
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${CURRENT}-dev.${SHORT_SHA}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Dev build label: $DEV_VERSION"
          echo "## Dev Build Label" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${DEV_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
