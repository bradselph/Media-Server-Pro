name: Dev Patch Version

on:
  push:
    branches: [ development ]
    # Match CI's paths-ignore so docs/asset-only pushes don't spin up the
    # runner just to bump a dev build label nobody will see.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'

concurrency:
  group: dev-version-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump-patch:
    runs-on: [self-hosted, Linux, X64, media-server]
    if: "!contains(github.event.head_commit.message, '[auto-version]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate and commit dev build label
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          # Strip any existing -dev suffix to get the base version
          BASE_VERSION=$(echo "$CURRENT" | sed 's/-dev\..*//')

          # Parse base version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"

          # Auto-increment patch for each dev build
          PATCH=$((PATCH + 1))
          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${BASE_VERSION}-dev.${SHORT_SHA}"

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "base=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Dev build label: $DEV_VERSION"

          echo "$DEV_VERSION" > VERSION

          # Also update the fallback version in main.go to match the dev base
          sed -i "s/Version\s*=\s*\"[^\"]*\"/Version   = \"${BASE_VERSION}\"/" cmd/server/main.go

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION cmd/server/main.go
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: dev build ${DEV_VERSION} [auto-version]"
          git push

          echo "## Dev Build Label" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${DEV_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
