name: Dev Patch Version

on:
  push:
    branches: [ development ]
    paths-ignore:
      - 'VERSION'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  bump-patch:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[auto-version]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Generate dev build label
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${CURRENT}-dev.${SHORT_SHA}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$DEV_VERSION" >> "$GITHUB_OUTPUT"
          echo "Dev build label: $DEV_VERSION"
          echo "## Dev Build Label" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${DEV_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
