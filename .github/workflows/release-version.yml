name: Release Version

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'

  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor
          - patch

concurrency:
  # Never cancel an in-progress release — a partial run leaves dangling tags
  # and incomplete GitHub Releases. Queue instead; the bump-release job's own
  # [auto-version] guard and paths-ignore prevent the workflow from triggering
  # on its own commits, so queueing here only happens on rapid successive pushes.
  group: release-version-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-release:
    runs-on: [self-hosted, Linux, X64, media-server]
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[auto-version]')
    outputs:
      new_version: ${{ steps.bump.outputs.new }}
      tag: ${{ steps.bump.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Determine bump type and new version
        id: bump
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          else
            MERGE_MSG="${{ github.event.head_commit.message }}"
            if echo "$MERGE_MSG" | grep -qiE '(BREAKING CHANGE:|^major:)'; then
              BUMP_TYPE="major"
            else
              BUMP_TYPE="minor"
            fi
          fi

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP_TYPE: $CURRENT → $NEW"

      - name: Update VERSION file
        run: echo "${{ steps.bump.outputs.new }}" > VERSION

      - name: Update main.go fallback version
        run: |
          sed -i 's/Version\s*=\s*"[^"]*"/Version   = "${{ steps.bump.outputs.new }}"/' cmd/server/main.go

      - name: Generate CHANGELOG entry
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | grep -v '\[auto-version\]')
          else
            COMMITS=$(git log --pretty=format:"- %s" | grep -v '\[auto-version\]')
          fi

          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.bump.outputs.new }}"
          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          NEW_ENTRY="## [${VERSION}] - ${DATE} (${BUMP_TYPE})\n\n${COMMITS}\n"

          if [ -f CHANGELOG.md ]; then
            HEADING=$(head -1 CHANGELOG.md)
            REST=$(tail -n +2 CHANGELOG.md)
            printf '%s\n\n%b\n%s' "$HEADING" "$NEW_ENTRY" "$REST" > CHANGELOG.md
          else
            printf '# Changelog\n\n%b' "$NEW_ENTRY" > CHANGELOG.md
          fi

      - name: Commit and push release bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION cmd/server/main.go CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: release ${{ steps.bump.outputs.new }} (${{ steps.bump.outputs.type }} bump) [auto-version]"
          git push

      - name: Create release tag
        run: |
          TAG="v${{ steps.bump.outputs.new }}"
          if ! git tag -l "$TAG" | grep -q "^${TAG}$"; then
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
            echo "Created tag $TAG"
          else
            echo "Tag $TAG already exists — skipping"
          fi

  # ─── Build binaries for all platforms ───────────────────────────────────────
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: bump-release
    if: always() && needs.bump-release.result == 'success'
    runs-on: [self-hosted, Linux, X64, media-server]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ''
          - goos: linux
            goarch: arm64
            suffix: ''
          - goos: windows
            goarch: amd64
            suffix: '.exe'
          - goos: darwin
            goarch: amd64
            suffix: ''
          - goos: darwin
            goarch: arm64
            suffix: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.bump-release.outputs.new_version }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/nuxt-ui/package-lock.json

      - name: Build embedded web UI (Nuxt → web/static/react)
        working-directory: web/nuxt-ui
        run: |
          npm ci
          npm run build

      - name: Build server binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.bump-release.outputs.new_version }}"
          BUILD_DATE=$(date -u +%Y-%m-%d)
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE}"

          go build -ldflags "${LDFLAGS}" -o "media-server-pro-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" ./cmd/server

      - name: Build media-receiver binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.bump-release.outputs.new_version }}"
          BUILD_DATE=$(date -u +%Y-%m-%d)
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.BuildDate=${BUILD_DATE}"

          go build -ldflags "${LDFLAGS}" -o "media-receiver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}" ./cmd/media-receiver

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            media-server-pro-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
            media-receiver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          retention-days: 1

  # ─── Create GitHub Release with all binaries ────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [bump-release, build]
    if: always() && needs.bump-release.result == 'success' && needs.build.result == 'success'
    runs-on: [self-hosted, Linux, X64, media-server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.bump-release.outputs.new_version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts && find . -type f -exec sha256sum {} \; > checksums-sha256.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.bump-release.outputs.new_version }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/p; /^## \[${VERSION}\]/!{ /^## \[/!p; } }" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          # Write to file to avoid escaping issues
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.bump-release.outputs.tag }}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file release_notes.md \
            artifacts/*
