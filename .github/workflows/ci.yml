name: CI

# TODO(BUG): paths-ignore is at the top level (line 15) but that is NOT valid
# GitHub Actions syntax. It must be nested under each trigger (push/pull_request).
# As written, the paths-ignore block is silently ignored and CI runs on every push,
# even for doc-only changes. Fix by moving paths-ignore under both push: and
# pull_request: blocks, like:
#   on:
#     push:
#       branches: [main, development]
#       paths-ignore: [...]
#     pull_request:
#       branches: [main, development]
#       paths-ignore: [...]
on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Cancel in-progress runs when a new push/PR arrives — reduces redundant runs
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Skip CI for doc-only, asset-only, or config-only changes
paths-ignore:
  - '**.md'
  - 'docs/**'
  - 'LICENSE'
  - '.gitignore'
  - '**.png'
  - '**.jpg'
  - '**.gif'
  - '**.svg'
  - '**.ico'
  - 'assets/**'
  - '*.editorconfig'

permissions:
  contents: read

jobs:
  # ─── Go: build, vet, test, security ────────────────────────────────────────
  go:
    name: Go Build, Test & Security
    runs-on: [self-hosted, Linux, X64, media-server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: go vet ./...

      # TODO: Installing golangci-lint@latest on every CI run is slow and
      # non-reproducible — the version changes without notice. Pin to a specific
      # version (e.g. v2.1.0) or use the official golangci-lint-action@v6.
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      # TODO: -race requires CGO_ENABLED=1 (the default), but the build step above
      # uses CGO_ENABLED=0. If the self-hosted runner has no C compiler, this test
      # step will fail with a confusing error. Either remove -race or ensure CGO is
      # available and consistent across steps.
      - name: Test
        run: go test -race -timeout 120s ./...

      # TODO: Same as golangci-lint — govulncheck@latest is non-reproducible.
      # Pin to a specific version for deterministic CI.
      - name: Security scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ─── Frontend: lint, build, test, audit ─────────────────────────────────────
  frontend:
    name: Frontend Lint, Build & Test
    runs-on: [self-hosted, Linux, X64, media-server]
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      # TODO: npm audit with --audit-level=high will fail the CI pipeline on any
      # high-severity vulnerability, even in devDependencies (which don't ship in
      # the production bundle). Consider adding --omit=dev to only audit production
      # dependencies, or use --audit-level=critical for a less noisy threshold.
      - name: npm audit
        run: npm audit --audit-level=high
