name: CI

on:
  push:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'
  pull_request:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'

# One CI run per branch at a time; a new push cancels the previous run.
# This group is ONLY entered by real code pushes — auto-version commits are
# excluded by paths-ignore above (they only touch VERSION/CHANGELOG/main.go).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Go: build, vet, test, security ────────────────────────────────────────
  go:
    name: Go Build, Test & Security
    runs-on: [self-hosted, Linux, X64, media-server]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.0

      - name: Test
        run: CGO_ENABLED=0 go test -timeout 120s ./...

      - name: Security scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ─── Nuxt UI: typecheck + production build ───────────────────────────────
  nuxt-ui:
    name: Nuxt UI Build & Typecheck
    runs-on: [self-hosted, Linux, X64, media-server]
    defaults:
      run:
        working-directory: web/nuxt-ui
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/nuxt-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + generate static SPA
        run: npm run check
