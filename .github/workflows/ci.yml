name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

# Cancel in-progress runs when a new push/PR arrives — reduces redundant runs
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Skip CI for doc-only, asset-only, or config-only changes
paths-ignore:
  - '**.md'
  - 'docs/**'
  - 'LICENSE'
  - '.gitignore'
  - '**.png'
  - '**.jpg'
  - '**.gif'
  - '**.svg'
  - '**.ico'
  - 'assets/**'
  - '*.editorconfig'

permissions:
  contents: read

jobs:
  # ─── Go: build, vet, test, security ────────────────────────────────────────
  go:
    name: Go Build, Test & Security
    runs-on: [self-hosted, Linux, X64, media-server]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -timeout 120s ./...

      - name: Security scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ─── Frontend: lint, build, test, audit ─────────────────────────────────────
  frontend:
    name: Frontend Lint, Build & Test
    runs-on: [self-hosted, Linux, X64, media-server]
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: npm audit
        run: npm audit --audit-level=high
