name: CI

on:
  # Push CI: every dev push gets fast feedback; every main commit gates the
  # release pipeline (release-version triggers off CI completion on main).
  push:
    branches: [main, development]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'

  # PR CI: only run for forks. Internal PRs (development → main) re-test the
  # same commits that already passed CI on the dev push and will be re-tested
  # on the main push after merge — running CI a third time on the merge ref
  # was burning ~6–9 minutes of self-hosted runner per PR for no new signal.
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'

# One CI run per ref at a time; a new push cancels the previous run.
# Auto-version commits are excluded by paths-ignore (they only touch
# VERSION/CHANGELOG/main.go).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Go: build, vet, test, security ────────────────────────────────────────
  go:
    name: Go Build, Test & Security
    # Skip pull_request runs from the same repo — those commits already got
    # push CI on the source branch. Only fork PRs need a separate CI pass.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: [self-hosted, Linux, X64, media-server]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./...

      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          only-new-issues: true

      - name: Test
        run: CGO_ENABLED=0 go test -timeout 120s ./...

      - name: Security scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  # ─── Nuxt UI: typecheck + production build ───────────────────────────────
  nuxt-ui:
    name: Nuxt UI Build & Typecheck
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: [self-hosted, Linux, X64, media-server]
    defaults:
      run:
        working-directory: web/nuxt-ui
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/nuxt-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + generate static SPA
        run: npm run check
