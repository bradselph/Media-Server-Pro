name: Synthesis CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  synthesis:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mediaserver
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=8

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "3306"
      DATABASE_NAME: mediaserver
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve CI paths from project settings
        run: python3 scripts/resolve_ci_paths.py

      - name: Partition boundary check
        run: |
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
          python3 scripts/check_partition_boundaries.py --base "${SYNTHESIS_PARTITION_BASE}" --head HEAD

      - name: Install CI script dependencies
        run: pip install -r scripts/requirements-ci.txt

      - name: Validate OpenAPI spec
        run: python3 scripts/validate_openapi.py

      - name: Completeness scan
        run: python3 scripts/check_completeness.py

      - uses: actions/setup-go@v5
        if: env.SYNTHESIS_SKIP_BACKEND_TESTS != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Backend tests (Go)
        if: env.SYNTHESIS_SKIP_BACKEND_TESTS != 'true'
        run: go test ./...

      - name: Install FFmpeg (thumbnails module)
        if: env.SYNTHESIS_SKIP_INTEGRATION_SMOKE != 'true'
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Integration smoke (GET /health)
        if: env.SYNTHESIS_SKIP_INTEGRATION_SMOKE != 'true'
        run: python3 scripts/integration_smoke.py

      - uses: actions/setup-node@v4
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.SYNTHESIS_CLIENT_LOCK }}

      - name: Install Nuxt UI dependencies
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        working-directory: ${{ env.SYNTHESIS_FRONTEND_DIR }}
        run: npm ci

      - name: Check Nuxt UI (typecheck + build)
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        working-directory: ${{ env.SYNTHESIS_FRONTEND_DIR }}
        run: npm run check
