name: Synthesis CI

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
      - '**.ico'
      - 'assets/**'
      - '*.editorconfig'
      - 'VERSION'
      - 'CHANGELOG.md'
      - 'cmd/server/main.go'

# Synthesis is a PR-only gate: partition boundaries, OpenAPI validity, and
# completeness are checked before code lands on main. ci.yml is the primary
# gate for push events so there is no duplicate run on the same self-hosted
# runner when a push and a release version bump race each other.
concurrency:
  group: synthesis-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthesis:
    runs-on: ubuntu-latest
    # Extra guard: skip workflow_run re-triggers caused by auto-version pushes
    # that slip through paths-ignore (e.g. when other files also changed).
    if: "!contains(github.event.head_commit.message, '[auto-version]')"
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mediaserver
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=8s
          --health-timeout=5s
          --health-retries=8

    env:
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "3306"
      DATABASE_NAME: mediaserver
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve CI paths from project settings
        run: python3 scripts/resolve_ci_paths.py

      - name: Partition boundary check
        run: |
          git fetch origin main:refs/remotes/origin/main 2>/dev/null || true
          python3 scripts/check_partition_boundaries.py --base "${SYNTHESIS_PARTITION_BASE}" --head HEAD

      - name: Install CI script dependencies
        run: pip install -r scripts/requirements-ci.txt

      - name: Validate OpenAPI spec
        run: python3 scripts/validate_openapi.py

      - name: Completeness scan
        run: python3 scripts/check_completeness.py

      - uses: actions/setup-go@v5
        if: env.SYNTHESIS_SKIP_BACKEND_TESTS != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Backend tests (Go)
        if: env.SYNTHESIS_SKIP_BACKEND_TESTS != 'true'
        run: go test ./...

      - name: Install FFmpeg (thumbnails module)
        if: env.SYNTHESIS_SKIP_INTEGRATION_SMOKE != 'true'
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Integration smoke (GET /health)
        if: env.SYNTHESIS_SKIP_INTEGRATION_SMOKE != 'true'
        run: python3 scripts/integration_smoke.py

      - uses: actions/setup-node@v5
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.SYNTHESIS_CLIENT_LOCK }}

      - name: Install Nuxt UI dependencies
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        working-directory: ${{ env.SYNTHESIS_FRONTEND_DIR }}
        run: npm ci

      - name: Check Nuxt UI (typecheck + build)
        if: env.SYNTHESIS_SKIP_CLIENT_JOB != 'true'
        working-directory: ${{ env.SYNTHESIS_FRONTEND_DIR }}
        run: npm run check
