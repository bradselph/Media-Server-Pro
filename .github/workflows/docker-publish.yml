name: Docker Publish

on:
  # Build and push on every release tag (created by release-version.yml).
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    # Also publish an :edge channel on every push to main so operators
    # can test the next release before the tag lands.
    branches:
      - main

  # Allow a manual trigger for testing or hotfixes.
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Image tag to push (default: branch/SHA)'
        required: false
        default: ''

concurrency:
  # Never cancel an in-progress publish — a partial push leaves broken manifests.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # needed to push to GHCR

env:
  REGISTRY: ghcr.io
  # Images are scoped to the repository owner so forks get their own namespace.
  MASTER_IMAGE:   ghcr.io/${{ github.repository_owner }}/media-server-pro
  RECEIVER_IMAGE: ghcr.io/${{ github.repository_owner }}/media-server-pro-receiver

jobs:
  # ─── Build and push the master server image ────────────────────────────────
  build-master:
    name: Master server image
    runs-on: [self-hosted, Linux, X64, media-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (for cross-arch arm64 builds on amd64 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MASTER_IMAGE }}
          # Explicit `latest=true` so :latest always tracks the newest semver
          # tag (don't rely on the action's auto-inference, which only kicks
          # in for some patterns).
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            # vX.Y.Z → :X.Y.Z, :X.Y, :X (and :latest via flavor above).
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # push to main → :edge (pre-release channel for operators)
            type=raw,value=edge,enable={{is_default_branch}}
            # manual dispatch without a semver tag → :branch-sha
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push master image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=1.26
            NODE_VERSION=22
          platforms: linux/amd64,linux/arm64
          # Layer cache keyed by branch so sequential builds reuse Go/npm layers.
          cache-from: type=gha,scope=master-${{ github.ref_name }}
          cache-to:   type=gha,scope=master-${{ github.ref_name }},mode=max

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Master image"
            echo ""
            echo "**Pushed to:** \`${{ env.MASTER_IMAGE }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "**Pull:** \`docker pull ${{ env.MASTER_IMAGE }}:${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Build and push the media-receiver (slave) image ─────────────────────
  build-receiver:
    name: Media receiver image
    runs-on: [self-hosted, Linux, X64, media-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (for cross-arch arm64 builds on amd64 runner)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RECEIVER_IMAGE }}
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push receiver image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.media-receiver
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=1.26
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=receiver-${{ github.ref_name }}
          cache-to:   type=gha,scope=receiver-${{ github.ref_name }},mode=max

      - name: Job summary
        if: always()
        run: |
          {
            echo "### Receiver image"
            echo ""
            echo "**Pushed to:** \`${{ env.RECEIVER_IMAGE }}\`"
            echo ""
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
