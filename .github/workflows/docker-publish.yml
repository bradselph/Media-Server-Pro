name: Docker Publish

on:
  # Build and push on every release tag (created by release-version.yml).
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  # Allow a manual trigger for testing or hotfixes.
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Image tag to push (default: branch/SHA)'
        required: false
        default: ''

concurrency:
  # Never cancel an in-progress publish — a partial push leaves broken manifests.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # needed to push to GHCR

env:
  REGISTRY: ghcr.io
  # Images are scoped to the repository owner so forks get their own namespace.
  MASTER_IMAGE:   ghcr.io/${{ github.repository_owner }}/media-server-pro
  RECEIVER_IMAGE: ghcr.io/${{ github.repository_owner }}/media-server-pro-receiver

jobs:
  # ─── Build and push the master server image ────────────────────────────────
  build-master:
    name: Master server image
    runs-on: [self-hosted, Linux, X64, media-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MASTER_IMAGE }}
          tags: |
            # vX.Y.Z → :X.Y.Z and :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # manual dispatch without a semver tag → :branch-sha
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push master image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=1.26
            NODE_VERSION=22
          platforms: linux/amd64
          # Layer cache keyed by branch so sequential builds reuse Go/npm layers.
          cache-from: type=gha,scope=master-${{ github.ref_name }}
          cache-to:   type=gha,scope=master-${{ github.ref_name }},mode=max

  # ─── Build and push the media-receiver (slave) image ─────────────────────
  build-receiver:
    name: Media receiver image
    runs-on: [self-hosted, Linux, X64, media-server]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RECEIVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push receiver image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.media-receiver
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GO_VERSION=1.26
          platforms: linux/amd64
          cache-from: type=gha,scope=receiver-${{ github.ref_name }}
          cache-to:   type=gha,scope=receiver-${{ github.ref_name }},mode=max
