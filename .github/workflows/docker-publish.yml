# Publish the Docker image to GHCR. Manual trigger only -- the image build
# is expensive (full Go + Nuxt rebuild across amd64 + arm64) and the project
# mostly deploys natively via deploy.sh, so we don't want this firing on
# every push. Run it when you actually want to ship a container image.
#
# Trigger from the Actions tab -> "Docker Publish" -> Run workflow, picking
# the branch (main / development) or a specific ref. Whatever you build is
# always published as `:latest` -- there is no branch-specific tagging.
#
# Pull what gets published with:
#   docker pull ghcr.io/bradselph/media-server-pro            # = :latest
#   docker pull ghcr.io/bradselph/media-server-pro:1.17.0     # pin a version

name: Docker Publish

on:
  # Manual only. No `push:`, no `workflow_run:`. Operator-driven.
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build (default: the branch this is triggered from)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

# If the operator triggers the workflow twice in a row, cancel the
# in-flight one -- old image bytes don't help anyone and the manual
# nature of the trigger means there's intent behind the second click.
concurrency:
  group: docker-publish-${{ inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out the requested ref
        uses: actions/checkout@v4
        with:
          # `inputs.ref` is empty by default -> checkout uses github.ref
          # (the branch the workflow was dispatched from). When the
          # operator types a value into the input, that wins.
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          v=$(tr -d '[:space:]' < VERSION || true)
          if [ -z "$v" ]; then v="0.0.0"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 cross-build on x86 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase owner because GHCR rejects uppercase image names.
          images: ghcr.io/${{ github.repository_owner }}/media-server-pro
          # Always publish `:latest` (regardless of branch) plus a version
          # tag for traceability / pinning. `latest=false` in flavor disables
          # metadata-action's branch-conditional auto-latest so OUR explicit
          # raw `latest` is the single source of truth.
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps Go module + Node deps + Nuxt build
          # layers between runs without publishing a stray `buildcache` tag
          # into the GHCR package listing.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=1.26
            NODE_VERSION=24

      - name: Summary
        run: |
          echo "Published the following tags to GHCR:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```sh' >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ghcr.io/${{ github.repository_owner }}/media-server-pro" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
