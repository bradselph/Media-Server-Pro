openapi: 3.0.3
info:
  title: Media Server Pro 4 API
  description: >
    Modular media streaming server providing video/audio streaming with HLS
    adaptive streaming, thumbnail generation, analytics, user authentication,
    mature content scanning, and admin management.
  version: 0.0.2
  license:
    name: Proprietary

servers:
  - url: /
    description: Same-origin server

tags:
  - name: auth
    description: Authentication and session management
  - name: media
    description: Media library browsing
  - name: streaming
    description: Direct media streaming and download
  - name: hls
    description: HLS adaptive streaming
  - name: playback
    description: Playback position tracking
  - name: playlists
    description: User playlist management
  - name: analytics
    description: Analytics and event tracking
  - name: watch-history
    description: User watch history
  - name: suggestions
    description: Content recommendations
  - name: upload
    description: Media file uploads
  - name: preferences
    description: User preferences
  - name: permissions
    description: User permissions and capabilities
  - name: settings
    description: Public server settings
  - name: age-gate
    description: Age verification gate
  - name: ratings
    description: Media ratings
  - name: thumbnails
    description: Thumbnail serving and generation
  - name: storage
    description: Storage usage
  - name: system
    description: System health and metrics
  - name: admin-dashboard
    description: Admin dashboard and system info
  - name: admin-users
    description: Admin user management
  - name: admin-media
    description: Admin media management
  - name: admin-tasks
    description: Admin background task management
  - name: admin-config
    description: Admin configuration
  - name: admin-audit
    description: Admin audit log and server logs
  - name: admin-backups
    description: Admin backup management (v2)
  - name: admin-scanner
    description: Admin mature content scanner
  - name: admin-hls
    description: Admin HLS management
  - name: admin-thumbnails
    description: Admin thumbnail management
  - name: admin-validator
    description: Admin media file validator
  - name: admin-playlists
    description: Admin playlist management
  - name: admin-security
    description: Admin IP security management
  - name: admin-categorizer
    description: Admin media categorization
  - name: admin-discovery
    description: Admin auto-discovery
  - name: admin-suggestions
    description: Admin suggestion stats
  - name: admin-remote
    description: Admin remote media sources
  - name: admin-updates
    description: Admin update management
  - name: admin-database
    description: Admin database management
  - name: admin-analytics
    description: Admin analytics detail and export

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id

  schemas:
    APIEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          description: Response payload (type varies by endpoint)
        error:
          type: string
      required: [success]

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, viewer]
        type:
          type: string
        email:
          type: string
        enabled:
          type: boolean
        permissions:
          $ref: '#/components/schemas/UserPermissions'
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        storage_used:
          type: integer
          format: int64
        active_streams:
          type: integer
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
        watch_history:
          type: array
          items:
            $ref: '#/components/schemas/WatchHistoryEntry'

    UserPermissions:
      type: object
      properties:
        can_stream:
          type: boolean
        can_download:
          type: boolean
        can_upload:
          type: boolean
        can_delete:
          type: boolean
        can_manage:
          type: boolean
        can_view_mature:
          type: boolean
        can_create_playlists:
          type: boolean

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto]
        default_quality:
          type: string
        show_mature:
          type: boolean
        mature_preference_set:
          type: boolean
        auto_play:
          type: boolean
        equalizer_preset:
          type: string
        resume_playback:
          type: boolean
        show_analytics:
          type: boolean
        items_per_page:
          type: integer
        view_mode:
          type: string
        playback_speed:
          type: number
        volume:
          type: number
        language:
          type: string
        sort_by:
          type: string
        sort_order:
          type: string
        filter_category:
          type: string
        filter_media_type:
          type: string
        custom_eq_presets:
          type: object
          additionalProperties: true

    LoginResponse:
      type: object
      properties:
        session_id:
          type: string
        is_admin:
          type: boolean
        username:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time

    SessionCheckResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        allow_guests:
          type: boolean
        user:
          $ref: '#/components/schemas/User'

    MediaItem:
      type: object
      properties:
        id:
          type: string
        path:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [video, audio, unknown]
        size:
          type: integer
          format: int64
        duration:
          type: number
        width:
          type: integer
        height:
          type: integer
        bitrate:
          type: integer
        codec:
          type: string
        container:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        views:
          type: integer
        last_played:
          type: string
          format: date-time
        is_mature:
          type: boolean
        mature_score:
          type: number
        is_remote:
          type: boolean
        remote_url:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string

    MediaListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        total_items:
          type: integer
        total_pages:
          type: integer
        scanning:
          type: boolean

    MediaCategory:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        count:
          type: integer
        tags:
          type: array
          items:
            type: string

    MediaStats:
      type: object
      properties:
        total_count:
          type: integer
        video_count:
          type: integer
        audio_count:
          type: integer
        total_size:
          type: integer
          format: int64
        last_scan:
          type: string
          format: date-time

    HLSCapabilities:
      type: object
      properties:
        available:
          type: boolean
        ffmpeg_found:
          type: boolean
        qualities:
          type: array
          items:
            type: string

    HLSAvailability:
      type: object
      properties:
        available:
          type: boolean
        hls_url:
          type: string
        id:
          type: string
        job_id:
          type: string
        media_path:
          type: string
        status:
          type: string
        progress:
          type: number
        qualities:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
        error:
          type: string

    HLSJob:
      type: object
      properties:
        id:
          type: string
        media_path:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: number
        qualities:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        hls_url:
          type: string
        available:
          type: boolean
        error:
          type: string
        fail_count:
          type: integer

    Playlist:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        user_id:
          type: string
        items:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PlaylistItem'
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time
        is_public:
          type: boolean
        cover_image:
          type: string

    PlaylistItem:
      type: object
      properties:
        id:
          type: string
        playlist_id:
          type: string
        media_id:
          type: string
        media_path:
          type: string
        title:
          type: string
        position:
          type: integer
        added_at:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        analytics_disabled:
          type: boolean
        total_events:
          type: integer
        active_sessions:
          type: integer
        today_views:
          type: integer
        total_views:
          type: integer
        total_media:
          type: integer
        unique_clients:
          type: integer
        top_viewed:
          type: array
          items:
            type: object
            properties:
              media_id:
                type: string
              filename:
                type: string
              views:
                type: integer
        recent_activity:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              media_id:
                type: string
              filename:
                type: string
              timestamp:
                type: integer

    AnalyticsEvent:
      type: object
      properties:
        type:
          type: string
        media_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true

    WatchHistoryEntry:
      type: object
      properties:
        media_id:
          type: string
        media_path:
          type: string
        position:
          type: number
        duration:
          type: number
        progress:
          type: number
        watched_at:
          type: string
          format: date-time
        completed:
          type: boolean

    Suggestion:
      type: object
      properties:
        media_path:
          type: string
        title:
          type: string
        category:
          type: string
        media_type:
          type: string
        score:
          type: number
        reasons:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string

    ServerSettings:
      type: object
      properties:
        thumbnails:
          type: object
          properties:
            enabled:
              type: boolean
            autoGenerate:
              type: boolean
            width:
              type: integer
            height:
              type: integer
            video_preview_count:
              type: integer
        streaming:
          type: object
          properties:
            mobileOptimization:
              type: boolean
        analytics:
          type: object
          properties:
            enabled:
              type: boolean
        features:
          type: object
          properties:
            enableThumbnails:
              type: boolean
            enableHLS:
              type: boolean
            enableAnalytics:
              type: boolean
            analytics_tracking:
              type: boolean
        uploads:
          type: object
          properties:
            enabled:
              type: boolean
            maxFileSize:
              type: integer
              format: int64
        admin:
          type: object
          properties:
            enabled:
              type: boolean
        ui:
          type: object
          properties:
            items_per_page:
              type: integer
            mobile_items_per_page:
              type: integer
            mobile_grid_columns:
              type: integer
        age_gate:
          type: object
          properties:
            enabled:
              type: boolean

    AgeGateStatus:
      type: object
      properties:
        enabled:
          type: boolean
        verified:
          type: boolean

    StorageUsage:
      type: object
      properties:
        used_bytes:
          type: integer
          format: int64
        used_gb:
          type: number
        quota_gb:
          type: integer
          format: int64
        percentage:
          type: number
        user_type:
          type: string
        is_authenticated:
          type: boolean

    PermissionsInfo:
      type: object
      properties:
        authenticated:
          type: boolean
        username:
          type: string
        role:
          type: string
        user_type:
          type: string
        show_mature:
          type: boolean
        mature_preference_set:
          type: boolean
        capabilities:
          type: object
          properties:
            canUpload:
              type: boolean
            canDownload:
              type: boolean
            canCreatePlaylists:
              type: boolean
            canViewMature:
              type: boolean
            canStream:
              type: boolean
            canDelete:
              type: boolean
            canManage:
              type: boolean
        limits:
          type: object
          properties:
            storage_quota:
              type: integer
              format: int64
            concurrent_streams:
              type: integer

    UploadResult:
      type: object
      properties:
        uploaded:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              size:
                type: integer
                format: int64
        errors:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              error:
                type: string

    UploadProgress:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        uploaded:
          type: integer
          format: int64
        progress:
          type: number
        status:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string
        user_id:
          type: string
        dest_path:
          type: string

    AdminStats:
      type: object
      properties:
        total_videos:
          type: integer
        total_audio:
          type: integer
        active_sessions:
          type: integer
        total_users:
          type: integer
        disk_usage:
          type: integer
          format: int64
        disk_total:
          type: integer
          format: int64
        disk_free:
          type: integer
          format: int64
        hls_jobs_running:
          type: integer
        hls_jobs_completed:
          type: integer
        server_uptime:
          type: integer
          format: int64
        total_views:
          type: integer

    SystemInfo:
      type: object
      properties:
        version:
          type: string
        build_date:
          type: string
        os:
          type: string
        arch:
          type: string
        go_version:
          type: string
        cpu_count:
          type: integer
        memory_used:
          type: integer
          format: int64
        memory_total:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
        modules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleHealth'

    ModuleHealth:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [healthy, unhealthy, degraded, failed, disabled]
        message:
          type: string
        last_check:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        username:
          type: string
        user_id:
          type: string
        action:
          type: string
        resource:
          type: string
        details:
          type: object
          additionalProperties: true
        ip_address:
          type: string
        success:
          type: boolean

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
        level:
          type: string
        module:
          type: string
        message:
          type: string
        raw:
          type: string

    ScheduledTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        schedule:
          type: string
        last_run:
          type: string
          format: date-time
        next_run:
          type: string
          format: date-time
        enabled:
          type: boolean
        running:
          type: boolean
        last_error:
          type: string

    BackupEntry:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        type:
          type: string
        description:
          type: string

    ScannerStats:
      type: object
      properties:
        total_scanned:
          type: integer
        mature_count:
          type: integer
        auto_flagged:
          type: integer
        pending_review:
          type: integer

    ScanResultItem:
      type: object
      properties:
        id:
          type: string
        media_path:
          type: string
        detected_at:
          type: string
          format: date-time
        confidence:
          type: number
        reasons:
          type: array
          nullable: true
          items:
            type: string
        reviewed_by:
          type: string
        reviewed_at:
          type: string
          format: date-time
        decision:
          type: string

    HLSStats:
      type: object
      properties:
        total_jobs:
          type: integer
        running_jobs:
          type: integer
        completed_jobs:
          type: integer
        failed_jobs:
          type: integer
        pending_jobs:
          type: integer
        cache_size_bytes:
          type: integer
          format: int64
        cache_dir:
          type: string

    HLSValidationResult:
      type: object
      properties:
        job_id:
          type: string
        valid:
          type: boolean
        variant_count:
          type: integer
        segment_count:
          type: integer
        errors:
          type: array
          items:
            type: string

    ThumbnailStats:
      type: object
      properties:
        total_thumbnails:
          type: integer
        total_size_mb:
          type: number
        pending_generation:
          type: integer
        generation_errors:
          type: integer

    ValidationResult:
      type: object
      properties:
        path:
          type: string
        status:
          type: string
        validated_at:
          type: string
          format: date-time
        duration:
          type: number
        video_codec:
          type: string
        audio_codec:
          type: string
        width:
          type: integer
        height:
          type: integer
        bitrate:
          type: integer
        container:
          type: string
        issues:
          type: array
          items:
            type: string
        fixed_path:
          type: string
        error:
          type: string
        video_supported:
          type: boolean
        audio_supported:
          type: boolean

    ValidatorStats:
      type: object
      properties:
        total:
          type: integer
        validated:
          type: integer
        needs_fix:
          type: integer
        fixed:
          type: integer
        failed:
          type: integer
        unsupported:
          type: integer

    DatabaseStatus:
      type: object
      properties:
        connected:
          type: boolean
        host:
          type: string
        database:
          type: string
        schema_version:
          type: integer
        repository_type:
          type: string
        message:
          type: string
        checked_at:
          type: string
          format: date-time

    QueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        rows_affected:
          type: integer
        message:
          type: string
        truncated:
          type: boolean
        error:
          type: string

    DailyStats:
      type: object
      properties:
        date:
          type: string
        total_views:
          type: integer
        unique_users:
          type: integer
        total_watch_time:
          type: number
        new_users:
          type: integer
        top_media:
          type: array
          items:
            type: string

    TopMediaItem:
      type: object
      properties:
        media_id:
          type: string
        filename:
          type: string
        views:
          type: integer
        media_path:
          type: string

    EventTypeCounts:
      type: object
      additionalProperties:
        type: integer

    EventStats:
      type: object
      properties:
        total_events:
          type: integer
        event_counts:
          type: object
          additionalProperties:
            type: integer
        hourly_events:
          type: array
          items:
            type: integer

    AdminPlaylistStats:
      type: object
      properties:
        total_playlists:
          type: integer
        public_playlists:
          type: integer
        total_items:
          type: integer

    SecurityStats:
      type: object
      properties:
        banned_ips:
          type: integer
        whitelisted_ips:
          type: integer
        blacklisted_ips:
          type: integer
        active_rate_limits:
          type: integer
        total_blocks_today:
          type: integer

    IPEntry:
      type: object
      properties:
        ip:
          type: string
        comment:
          type: string
        added_by:
          type: string
        added_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    BannedIP:
      type: object
      properties:
        ip:
          type: string
        banned_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        reason:
          type: string

    CategorizedItem:
      type: object
      properties:
        path:
          type: string
        category:
          type: string
        confidence:
          type: number
        detected_info:
          type: object
          additionalProperties: true
        categorized_at:
          type: string
          format: date-time
        manual_override:
          type: boolean

    CategoryStats:
      type: object
      properties:
        total_items:
          type: integer
        by_category:
          type: object
          additionalProperties:
            type: integer
        manual_overrides:
          type: integer

    DiscoverySuggestion:
      type: object
      properties:
        original_path:
          type: string
        suggested_name:
          type: string
        suggested_path:
          type: string
        type:
          type: string
        confidence:
          type: number
        metadata:
          type: object
          additionalProperties:
            type: string

    SuggestionStats:
      type: object
      properties:
        total_profiles:
          type: integer
        total_media:
          type: integer
        total_views:
          type: integer
        total_watch_time:
          type: number

    RemoteSource:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        username:
          type: string
        password:
          type: string
        enabled:
          type: boolean

    RemoteSourceState:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/RemoteSource'
        status:
          type: string
        last_sync:
          type: string
          format: date-time
        media_count:
          type: integer
        error:
          type: string
        media:
          type: array
          items:
            $ref: '#/components/schemas/RemoteMediaItem'

    RemoteMediaItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        path:
          type: string
        url:
          type: string
        source_name:
          type: string
        size:
          type: integer
          format: int64
        content_type:
          type: string
        duration:
          type: number
        metadata:
          type: object
          additionalProperties:
            type: string
        cached_at:
          type: string
          format: date-time

    RemoteStats:
      type: object
      properties:
        source_count:
          type: integer
        cached_item_count:
          type: integer
        total_media_count:
          type: integer
        cache_size:
          type: integer
          format: int64
        sources:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              media_count:
                type: integer
              last_sync:
                type: string
                format: date-time
              error:
                type: string

    BulkResult:
      type: object
      properties:
        success:
          type: integer
        failed:
          type: integer
        errors:
          type: array
          items:
            type: string

paths:
  # ─── Direct routes (not under /api) ───

  /health:
    get:
      tags: [system]
      summary: Health check
      description: Returns 200 when healthy, 503 when degraded. No auth required.
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded

  /metrics:
    get:
      tags: [system]
      summary: Prometheus metrics
      security:
        - sessionCookie: []
      description: Admin-only. Returns text/plain Prometheus metrics.
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /media:
    get:
      tags: [streaming]
      summary: Stream a media file
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
        - name: quality
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Media stream with Range support
        '206':
          description: Partial content

  /download:
    get:
      tags: [streaming]
      summary: Download a media file
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download

  /hls/{id}/master.m3u8:
    get:
      tags: [hls]
      summary: Serve HLS master playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /hls/{id}/{quality}/playlist.m3u8:
    get:
      tags: [hls]
      summary: Serve HLS variant playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS variant playlist

  /hls/{id}/{quality}/{segment}:
    get:
      tags: [hls]
      summary: Serve HLS segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MPEG-TS segment

  /thumbnail:
    get:
      tags: [thumbnails]
      summary: Get thumbnail for media path
      parameters:
        - name: path
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [placeholder, audio_placeholder, censored]
      responses:
        '200':
          description: JPEG image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /thumbnails/{filename}:
    get:
      tags: [thumbnails]
      summary: Serve thumbnail file by name
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JPEG/PNG image

  /remote/stream:
    get:
      tags: [streaming]
      summary: Proxy remote media stream
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Proxied media stream

  # ─── API routes (/api) ───

  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      responses:
        '200':
          description: Logged out

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 64
                password:
                  type: string
                  minLength: 8
                email:
                  type: string
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /api/auth/session:
    get:
      tags: [auth]
      summary: Check session status
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionCheckResponse'

  /api/auth/change-password:
    post:
      tags: [auth]
      summary: Change own password
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed

  /api/auth/delete-account:
    post:
      tags: [auth]
      summary: Delete own account
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Account deleted

  /api/permissions:
    get:
      tags: [permissions]
      summary: Get permissions and capabilities
      responses:
        '200':
          description: Permissions info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PermissionsInfo'

  /api/storage-usage:
    get:
      tags: [storage]
      summary: Get storage usage
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Storage usage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StorageUsage'

  /api/server-settings:
    get:
      tags: [settings]
      summary: Get public server settings
      responses:
        '200':
          description: Server settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerSettings'

  /api/age-gate/status:
    get:
      tags: [age-gate]
      summary: Get age gate status
      responses:
        '200':
          description: Age gate status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AgeGateStatus'

  /api/age-verify:
    post:
      tags: [age-gate]
      summary: Verify age
      responses:
        '200':
          description: Verified

  /api/preferences:
    get:
      tags: [preferences]
      summary: Get user preferences
      security:
        - sessionCookie: []
      responses:
        '200':
          description: User preferences
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserPreferences'
    post:
      tags: [preferences]
      summary: Update user preferences (partial merge)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPreferences'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserPreferences'

  /api/media:
    get:
      tags: [media]
      summary: List media items
      parameters:
        - name: sort
          in: query
          schema:
            type: string
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 500
        - name: offset
          in: query
          schema:
            type: integer
            maximum: 50000
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tags
        - name: is_mature
          in: query
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Media list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MediaListResponse'

  /api/media/stats:
    get:
      tags: [media]
      summary: Get media statistics
      responses:
        '200':
          description: Media stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MediaStats'

  /api/media/categories:
    get:
      tags: [media]
      summary: Get media categories
      responses:
        '200':
          description: Categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/MediaCategory'

  /api/media/{id}:
    get:
      tags: [media]
      summary: Get single media item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Media item
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/MediaItem'

  /api/playback:
    get:
      tags: [playback]
      summary: Get playback position
      security:
        - sessionCookie: []
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playback position
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          position:
                            type: number
    post:
      tags: [playback]
      summary: Track playback position
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, position, duration]
              properties:
                path:
                  type: string
                position:
                  type: number
                duration:
                  type: number
      responses:
        '200':
          description: Tracked

  /api/hls/capabilities:
    get:
      tags: [hls]
      summary: Get HLS capabilities
      responses:
        '200':
          description: HLS capabilities
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSCapabilities'

  /api/hls/check:
    get:
      tags: [hls]
      summary: Check HLS availability for media path
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS availability
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSAvailability'

  /api/hls/generate:
    post:
      tags: [hls]
      summary: Generate HLS for media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                quality:
                  type: string
                qualities:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: HLS job started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSJob'

  /api/hls/status/{id}:
    get:
      tags: [hls]
      summary: Get HLS job status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS job status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HLSJob'

  /api/playlists:
    get:
      tags: [playlists]
      summary: List user playlists
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Playlists
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Playlist'
    post:
      tags: [playlists]
      summary: Create playlist
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                is_public:
                  type: boolean
      responses:
        '200':
          description: Created playlist
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Playlist'

  /api/playlists/{id}:
    get:
      tags: [playlists]
      summary: Get playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Playlist
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Playlist'
    put:
      tags: [playlists]
      summary: Update playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                is_public:
                  type: boolean
      responses:
        '200':
          description: Updated playlist
    delete:
      tags: [playlists]
      summary: Delete playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted

  /api/playlists/{id}/export:
    get:
      tags: [playlists]
      summary: Export playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, m3u, m3u8]
            default: json
      responses:
        '200':
          description: Playlist export file

  /api/playlists/{id}/items:
    post:
      tags: [playlists]
      summary: Add item to playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_id:
                  type: string
                media_path:
                  type: string
                title:
                  type: string
                path:
                  type: string
                name:
                  type: string
      responses:
        '200':
          description: Item added
    delete:
      tags: [playlists]
      summary: Remove item from playlist
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: media_path
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Item removed

  /api/analytics:
    get:
      tags: [analytics]
      summary: Get analytics summary (admin only)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AnalyticsSummary'

  /api/analytics/events:
    post:
      tags: [analytics]
      summary: Submit analytics event
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, media_id]
              properties:
                type:
                  type: string
                media_id:
                  type: string
                session_id:
                  type: string
                duration:
                  type: number
                data:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Event recorded

  /api/analytics/daily:
    get:
      tags: [admin-analytics]
      summary: Get daily statistics (admin only)
      security:
        - sessionCookie: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
      responses:
        '200':
          description: Daily stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DailyStats'

  /api/analytics/top:
    get:
      tags: [admin-analytics]
      summary: Get top media (admin only)
      security:
        - sessionCookie: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 10
      responses:
        '200':
          description: Top media
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/TopMediaItem'

  /api/analytics/events/stats:
    get:
      tags: [admin-analytics]
      summary: Get event statistics (admin only)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Event stats
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventStats'

  /api/analytics/events/by-type:
    get:
      tags: [admin-analytics]
      summary: Get events by type (admin only)
      security:
        - sessionCookie: []
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AnalyticsEvent'

  /api/analytics/events/by-media:
    get:
      tags: [admin-analytics]
      summary: Get events by media (admin only)
      security:
        - sessionCookie: []
      parameters:
        - name: media_id
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AnalyticsEvent'

  /api/analytics/events/counts:
    get:
      tags: [admin-analytics]
      summary: Get event type counts (admin only)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Event counts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EventTypeCounts'

  /api/watch-history:
    get:
      tags: [watch-history]
      summary: Get watch history
      security:
        - sessionCookie: []
      parameters:
        - name: path
          in: query
          schema:
            type: string
          description: Filter to single item
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Watch history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WatchHistoryEntry'
    delete:
      tags: [watch-history]
      summary: Clear watch history (or delete single item)
      security:
        - sessionCookie: []
      parameters:
        - name: path
          in: query
          schema:
            type: string
          description: If provided, deletes single item; otherwise clears all.
      responses:
        '200':
          description: History cleared/removed

  /api/thumbnails/previews:
    get:
      tags: [thumbnails]
      summary: Get thumbnail preview URLs
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Preview URLs

  /api/suggestions:
    get:
      tags: [suggestions]
      summary: Get content suggestions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 100
            default: 10
      responses:
        '200':
          description: Suggestions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Suggestion'

  /api/suggestions/trending:
    get:
      tags: [suggestions]
      summary: Get trending content
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 100
            default: 10
