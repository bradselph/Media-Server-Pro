paths:
  # ─── Direct routes (not under /api) ───

  /health:
    get:
      tags: [system]
      summary: Health check
      description: Returns 200 when healthy, 503 when degraded. No auth required.
      responses:
        '200':
          description: Healthy
        '503':
          description: Degraded

  /metrics:
    get:
      tags: [system]
      summary: Prometheus metrics
      security:
        - sessionCookie: []
      description: Admin-only. Returns text/plain Prometheus metrics.
      responses:
        '200':
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string

  /media:
    get:
      tags: [streaming]
      summary: Stream a media file
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
        - name: quality
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Media stream with Range support
        '206':
          description: Partial content

  /download:
    get:
      tags: [streaming]
      summary: Download a media file
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File download

  /hls/{id}/master.m3u8:
    get:
      tags: [hls]
      summary: Serve HLS master playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /hls/{id}/{quality}/playlist.m3u8:
    get:
      tags: [hls]
      summary: Serve HLS variant playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS variant playlist

  /hls/{id}/{quality}/{segment}:
    get:
      tags: [hls]
      summary: Serve HLS segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MPEG-TS segment

  /thumbnail:
    get:
      tags: [thumbnails]
      summary: Get thumbnail for media item
      parameters:
        - name: id
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [placeholder, audio_placeholder, censored]
      responses:
        '200':
          description: JPEG image
          content:
            image/jpeg:
              schema:
                type: string
                format: binary

  /thumbnails/{filename}:
    get:
      tags: [thumbnails]
      summary: Serve thumbnail file by name
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JPEG/PNG image

  /remote/stream:
    get:
      tags: [streaming]
      summary: Proxy remote media stream
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Proxied media stream

  /extractor/hls/{id}/master.m3u8:
    get:
      tags: [admin-extractor]
      summary: Proxy extractor HLS master playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS master playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /extractor/hls/{id}/{quality}/playlist.m3u8:
    get:
      tags: [admin-extractor]
      summary: Proxy extractor HLS variant playlist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: HLS variant playlist
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string

  /extractor/hls/{id}/{quality}/{segment}:
    get:
      tags: [admin-extractor]
      summary: Proxy extractor HLS segment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: quality
          in: path
          required: true
          schema:
            type: string
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binary TS segment data

  # ─── API routes (/api) ───

  /api/version:
    get:
      tags: [version]
      summary: Get server version
      responses:
        '200':
          description: Server version
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          version:
                            type: string

  /api/auth/login:
    post:
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      responses:
        '200':
          description: Logged out

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 64
                password:
                  type: string
                  minLength: 8
                email:
                  type: string
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /api/auth/session:
    get:
      tags: [auth]
      summary: Check session status
      responses:
        '200':
          description: Session info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SessionCheckResponse'

  /api/auth/change-password:
    post:
      tags: [auth]
      summary: Change own password
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed

  /api/auth/delete-account:
    post:
      tags: [auth]
      summary: Delete own account
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: Account deleted

  /api/auth/data-deletion-request:
    post:
      tags: [auth]
      summary: Request account data deletion
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Deletion request submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                          message:
                            type: string
                          id:
                            type: string

  /api/auth/tokens:
    get:
      tags: [tokens]
      summary: List API tokens
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/APIToken'
    post:
      tags: [tokens]
      summary: Create API token
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Token created (raw token returned once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/APITokenCreated'

  /api/auth/tokens/{id}:
    delete:
      tags: [tokens]
      summary: Delete API token
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Token deleted

  /api/permissions:
    get:
      tags: [permissions]
      summary: Get permissions and capabilities
      responses:
        '200':
          description: Permissions info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PermissionsInfo'

  /api/storage-usage:
    get:
      tags: [storage]
      summary: Get storage usage
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Storage usage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/StorageUsage'

  /api/server-settings:
    get:
      tags: [settings]
      summary: Get public server settings
      responses:
        '200':
          description: Server settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/APIEnvelope'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ServerSettings'

  /api/docs:
    get:
      tags: [docs]
      summary: Get OpenAPI specification
