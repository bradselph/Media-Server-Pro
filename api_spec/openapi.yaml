openapi: 3.0.3
info:
  title: Media Server Pro API
  description: >
    Modular media streaming server providing video/audio streaming with HLS
    adaptive streaming, thumbnail generation, analytics, user authentication,
    mature content scanning, and admin management.
  version: 0.0.3
  license:
    name: Proprietary

servers:
  - url: /
    description: Same-origin server

tags:
  - name: auth
    description: Authentication and session management
  - name: media
    description: Media library browsing
  - name: streaming
    description: Direct media streaming and download
  - name: hls
    description: HLS adaptive streaming
  - name: playback
    description: Playback position tracking
  - name: playlists
    description: User playlist management
  - name: analytics
    description: Analytics and event tracking
  - name: watch-history
    description: User watch history
  - name: suggestions
    description: Content recommendations
  - name: upload
    description: Media file uploads
  - name: preferences
    description: User preferences
  - name: permissions
    description: User permissions and capabilities
  - name: settings
    description: Public server settings
  - name: age-gate
    description: Age verification gate
  - name: ratings
    description: Media ratings
  - name: thumbnails
    description: Thumbnail serving and generation
  - name: storage
    description: Storage usage
  - name: system
    description: System health and metrics
  - name: admin-dashboard
    description: Admin dashboard and system info
  - name: admin-users
    description: Admin user management
  - name: admin-media
    description: Admin media management
  - name: admin-tasks
    description: Admin background task management
  - name: admin-config
    description: Admin configuration
  - name: admin-audit
    description: Admin audit log and server logs
  - name: admin-backups
    description: Admin backup management (v2)
  - name: admin-scanner
    description: Admin mature content scanner
  - name: admin-hls
    description: Admin HLS management
  - name: admin-thumbnails
    description: Admin thumbnail management
  - name: admin-validator
    description: Admin media file validator
  - name: admin-playlists
    description: Admin playlist management
  - name: admin-security
    description: Admin IP security management
  - name: admin-categorizer
    description: Admin media categorization
  - name: admin-discovery
    description: Admin auto-discovery
  - name: admin-suggestions
    description: Admin suggestion stats
  - name: admin-remote
    description: Admin remote media sources
  - name: admin-updates
    description: Admin update management
  - name: admin-database
    description: Admin database management
  - name: admin-analytics
    description: Admin analytics detail and export
  - name: favorites
    description: User favorites / watch later
  - name: tokens
    description: API token management
  - name: feed
    description: RSS/Atom content feed
  - name: version
    description: Server version info
  - name: browse
    description: Category browsing
  - name: docs
    description: OpenAPI spec endpoint
  - name: admin-classify
    description: Admin HuggingFace visual classification
  - name: admin-extractor
    description: Admin stream extractor / HLS proxy
  - name: admin-crawler
    description: Admin web crawler for stream discovery
  - name: admin-downloader
    description: Admin media downloader (yt-dlp)
  - name: admin-duplicates
    description: Admin duplicate detection and resolution
  - name: admin-receiver
    description: Admin receiver master-slave management
  - name: receiver
    description: Receiver slave-to-master API (X-API-Key auth)
  - name: admin-streams
    description: Admin active streams and uploads

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session_id

  schemas:
    APIEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          description: Response payload (type varies by endpoint)
        error:
          type: string
      required: [success]

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [admin, viewer]
        type:
          type: string
        email:
          type: string
        enabled:
          type: boolean
        permissions:
          $ref: '#/components/schemas/UserPermissions'
        preferences:
          $ref: '#/components/schemas/UserPreferences'
        storage_used:
          type: integer
          format: int64
        active_streams:
          type: integer
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
        previous_last_login:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true
        watch_history:
          type: array
          items:
            $ref: '#/components/schemas/WatchHistoryEntry'

    UserPermissions:
      type: object
      properties:
        can_stream:
          type: boolean
        can_download:
          type: boolean
        can_upload:
          type: boolean
        can_delete:
          type: boolean
        can_manage:
          type: boolean
        can_view_mature:
          type: boolean
        can_create_playlists:
          type: boolean

    UserPreferences:
      type: object
      properties:
        theme:
          type: string
          enum: [light, dark, auto, midnight, nord, dracula, solarized-light, forest, sunset]
        default_quality:
          type: string
        show_mature:
          type: boolean
        mature_preference_set:
          type: boolean
        auto_play:
          type: boolean
        equalizer_preset:
          type: string
        resume_playback:
          type: boolean
        show_analytics:
          type: boolean
        items_per_page:
          type: integer
        view_mode:
          type: string
        playback_speed:
          type: number
        volume:
          type: number
        language:
          type: string
        sort_by:
          type: string
        sort_order:
          type: string
        filter_category:
          type: string
        filter_media_type:
          type: string
        custom_eq_presets:
          type: object
          additionalProperties: true
        show_continue_watching:
          type: boolean
        show_recommended:
          type: boolean
        show_trending:
          type: boolean
        user_id:
          type: string

    LoginResponse:
      type: object
      properties:
        session_id:
          type: string
        is_admin:
          type: boolean
        username:
          type: string
        role:
          type: string
        expires_at:
          type: string
          format: date-time

    SessionCheckResponse:
      type: object
      properties:
        authenticated:
          type: boolean
        allow_guests:
          type: boolean
        user:
          $ref: '#/components/schemas/User'

    MediaItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [video, audio, unknown]
        size:
          type: integer
          format: int64
        duration:
          type: number
        width:
          type: integer
        height:
          type: integer
        bitrate:
          type: integer
          format: int64
        codec:
          type: string
        container:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string
        date_added:
          type: string
          format: date-time
        date_modified:
          type: string
          format: date-time
        views:
          type: integer
        last_played:
          type: string
          format: date-time
        is_mature:
          type: boolean
        mature_score:
          type: number
        blur_hash:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string

    MediaListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        total_items:
          type: integer
        total_pages:
          type: integer
        scanning:
          type: boolean
        user_ratings:
          type: object
          additionalProperties:
            type: number
            format: float
          description: Map of media_id to user rating
        initializing:
          type: boolean
          description: True when media library is still loading

    MediaCategory:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        count:
          type: integer
        tags:
          type: array
          items:
            type: string

    MediaStats:
      type: object
      properties:
        total_count:
          type: integer
        video_count:
          type: integer
        audio_count:
          type: integer
        total_size:
          type: integer
          format: int64
        last_scan:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
          description: Cache invalidation counter

    HLSCapabilities:
      type: object
      properties:
        available:
          type: boolean
        ffmpeg_found:
          type: boolean
        qualities:
          type: array
          items:
            type: string

    HLSAvailability:
      type: object
      properties:
        available:
          type: boolean
        hls_url:
          type: string
        id:
          type: string
        job_id:
          type: string
        media_path:
          type: string
        status:
          type: string
        progress:
          type: number
        qualities:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
        error:
          type: string

    HLSJob:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: number
        qualities:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        hls_url:
          type: string
        available:
          type: boolean
        error:
          type: string
        fail_count:
          type: integer
        last_accessed_at:
          type: string
          format: date-time
          nullable: true

    Playlist:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        user_id:
          type: string
        items:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/PlaylistItem'
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time
        is_public:
          type: boolean
        cover_image:
          type: string

    PlaylistItem:
      type: object
      properties:
        id:
          type: string
        playlist_id:
          type: string
        media_id:
          type: string
        title:
          type: string
        position:
          type: integer
        added_at:
          type: string
          format: date-time

    AnalyticsSummary:
      type: object
      properties:
        analytics_disabled:
          type: boolean
        total_events:
          type: integer
        active_sessions:
          type: integer
        today_views:
          type: integer
        total_views:
          type: integer
        total_media:
          type: integer
        unique_clients:
          type: integer
        top_viewed:
          type: array
          items:
            type: object
            properties:
              media_id:
                type: string
              filename:
                type: string
              views:
                type: integer
        recent_activity:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              media_id:
                type: string
              filename:
                type: string
              timestamp:
                type: integer
        today_logins:
          type: integer
          description: Successful logins today (server-tracked traffic)
        today_logins_failed:
          type: integer
          description: Failed login attempts today
        today_registrations:
          type: integer
          description: New user registrations today
        today_age_gate_passes:
          type: integer
          description: Age-gate verifications completed today
        today_downloads:
          type: integer
          description: Media download events today
        today_searches:
          type: integer
          description: Library search requests with non-empty query today
        total_watch_time:
          type: number
          description: Total watch time in seconds

    AnalyticsEvent:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        media_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        ip_address:
          type: string
        user_agent:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true

    WatchHistoryEntry:
      type: object
      properties:
        media_id:
          type: string
        position:
          type: number
        duration:
          type: number
        progress:
          type: number
        watched_at:
          type: string
          format: date-time
        completed:
          type: boolean
        media_name:
          type: string

    Suggestion:
      type: object
      required: [media_id, title, category, media_type, score]
      properties:
        media_id:
          type: string
        title:
          type: string
        category:
          type: string
        media_type:
          type: string
        score:
          type: number
        reasons:
          type: array
          items:
            type: string
        thumbnail_url:
          type: string

    ServerSettings:
      type: object
      properties:
        thumbnails:
          type: object
          properties:
            enabled:
              type: boolean
            autoGenerate:
              type: boolean
            width:
              type: integer
            height:
              type: integer
            video_preview_count:
              type: integer
        streaming:
          type: object
          properties:
            mobileOptimization:
              type: boolean
            adaptive:
              type: boolean
        analytics:
          type: object
          properties:
            enabled:
              type: boolean
        features:
          type: object
          properties:
            enableThumbnails:
              type: boolean
            enableHLS:
              type: boolean
            enableAnalytics:
              type: boolean
            enablePlaylists:
              type: boolean
            enableUserAuth:
              type: boolean
            enableAdminPanel:
              type: boolean
            enableSuggestions:
              type: boolean
            enableAutoDiscovery:
              type: boolean
            enableDuplicateDetection:
              type: boolean
            enableDownloader:
              type: boolean
        uploads:
          type: object
          properties:
            enabled:
              type: boolean
            maxFileSize:
              type: integer
              format: int64
        admin:
          type: object
          properties:
            enabled:
              type: boolean
        ui:
          type: object
          properties:
            items_per_page:
              type: integer
            mobile_items_per_page:
              type: integer
            mobile_grid_columns:
              type: integer
        age_gate:
          type: object
          properties:
            enabled:
              type: boolean
        auth:
          type: object
          properties:
            allow_registration:
              type: boolean
            allow_guests:
              type: boolean

    AgeGateStatus:
      type: object
      properties:
        enabled:
          type: boolean
        verified:
          type: boolean

    StorageUsage:
      type: object
      properties:
        used_bytes:
          type: integer
          format: int64
        used_gb:
          type: number
        quota_gb:
          type: number
        percentage:
          type: number
        user_type:
          type: string
        is_authenticated:
          type: boolean

    PermissionsInfo:
      type: object
      properties:
        authenticated:
          type: boolean
        username:
          type: string
        role:
          type: string
        user_type:
          type: string
        show_mature:
          type: boolean
        mature_preference_set:
          type: boolean
        capabilities:
          type: object
          properties:
            canUpload:
              type: boolean
            canDownload:
              type: boolean
            canCreatePlaylists:
              type: boolean
            canViewMature:
              type: boolean
            canStream:
              type: boolean
            canDelete:
              type: boolean
            canManage:
              type: boolean
        limits:
          type: object
          properties:
            storage_quota:
              type: integer
              format: int64
            concurrent_streams:
              type: integer

    UploadResult:
      type: object
      properties:
        uploaded:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              size:
                type: integer
                format: int64
        errors:
          type: array
          items:
            type: object
            properties:
              filename:
                type: string
              error:
                type: string

    UploadProgress:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        uploaded:
          type: integer
          format: int64
        progress:
          type: number
        status:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error:
          type: string
        user_id:
          type: string
        dest_path:
          type: string

    AdminStats:
      type: object
      properties:
        total_videos:
          type: integer
        total_audio:
          type: integer
        active_sessions:
          type: integer
        total_users:
          type: integer
        disk_usage:
          type: integer
          format: int64
        disk_total:
          type: integer
          format: int64
        disk_free:
          type: integer
          format: int64
        hls_jobs_running:
          type: integer
        hls_jobs_completed:
          type: integer
        server_uptime:
          type: integer
          format: int64
        total_views:
          type: integer

    SystemInfo:
      type: object
      properties:
        version:
          type: string
        build_date:
          type: string
        os:
          type: string
        arch:
          type: string
        go_version:
          type: string
        cpu_count:
          type: integer
        memory_used:
          type: integer
          format: int64
        memory_total:
          type: integer
          format: int64
        uptime:
          type: integer
          format: int64
        modules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleHealth'

    ModuleHealth:
      type: object
      properties:
        name:
          type: string
        status:
          type: string
          enum: [healthy, unhealthy, degraded, failed, disabled]
        message:
          type: string
        last_check:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: string
          format: date-time
        username:
          type: string
        user_id:
          type: string
        action:
          type: string
        resource:
          type: string
        details:
          type: object
          additionalProperties: true
        ip_address:
          type: string
        success:
          type: boolean

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
        level:
          type: string
        module:
          type: string
        message:
          type: string
        raw:
          type: string

    ScheduledTask:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        schedule:
          type: string
        last_run:
          type: string
          format: date-time
        next_run:
          type: string
          format: date-time
        enabled:
          type: boolean
        running:
          type: boolean
        last_error:
          type: string

    BackupEntry:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        size:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        type:
          type: string
        description:
          type: string

    ScannerStats:
      type: object
      properties:
        total_scanned:
          type: integer
        mature_count:
          type: integer
        auto_flagged:
          type: integer
        pending_review:
          type: integer

    ScanResultItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        media_path:
          type: string
        detected_at:
          type: string
          format: date-time
        confidence:
          type: number
        reasons:
          type: array
          nullable: true
          items:
            type: string
        reviewed_by:
          type: string
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        decision:
          type: string

    HLSStats:
      type: object
      properties:
        total_jobs:
          type: integer
        running_jobs:
          type: integer
        completed_jobs:
          type: integer
        failed_jobs:
          type: integer
        pending_jobs:
          type: integer
        cache_size_bytes:
          type: integer
          format: int64
        cache_dir:
          type: string

    HLSValidationResult:
      type: object
      properties:
        job_id:
          type: string
        valid:
          type: boolean
        variant_count:
          type: integer
        segment_count:
          type: integer
        errors:
          type: array
          items:
            type: string

    ThumbnailStats:
      type: object
      properties:
        total_thumbnails:
          type: integer
        total_size_mb:
          type: number
        pending_generation:
          type: integer
        generation_errors:
          type: integer

    ValidationResult:
      type: object
      properties:
        path:
          type: string
        status:
          type: string
        validated_at:
          type: string
          format: date-time
        duration:
          type: number
        video_codec:
          type: string
        audio_codec:
          type: string
        width:
          type: integer
        height:
          type: integer
        bitrate:
          type: integer
        container:
          type: string
        issues:
          type: array
          items:
            type: string
        fixed_path:
          type: string
        error:
          type: string
        video_supported:
          type: boolean
        audio_supported:
          type: boolean

    ValidatorStats:
      type: object
      properties:
        total:
          type: integer
        validated:
          type: integer
        needs_fix:
          type: integer
        fixed:
          type: integer
        failed:
          type: integer
        unsupported:
          type: integer

    DatabaseStatus:
      type: object
      properties:
        connected:
          type: boolean
        host:
          type: string
        database:
          type: string
        app_version:
          type: string
        repository_type:
          type: string
        message:
          type: string
        checked_at:
          type: string
          format: date-time

    QueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items: {}
        rows_affected:
          type: integer
        message:
          type: string
        truncated:
          type: boolean
        error:
          type: string

    DailyStats:
      type: object
      properties:
        date:
          type: string
        total_views:
          type: integer
        unique_users:
          type: integer
        total_watch_time:
          type: number
        new_users:
          type: integer
        top_media:
          type: array
          items:
            type: string
        logins:
          type: integer
          description: Successful logins that day
        logins_failed:
          type: integer
        logouts:
          type: integer
        registrations:
          type: integer
          description: New registrations that day (also increments new_users)
        age_gate_passes:
          type: integer
        downloads:
          type: integer
        searches:
          type: integer
          description: Non-empty media list searches

    TopMediaItem:
      type: object
      properties:
        media_id:
          type: string
        filename:
          type: string
        views:
          type: integer

    EventTypeCounts:
      type: object
      additionalProperties:
        type: integer

    EventStats:
      type: object
      properties:
        total_events:
          type: integer
        event_counts:
          type: object
          additionalProperties:
            type: integer
        hourly_events:
          type: array
          items:
            type: integer

    AdminPlaylistStats:
      type: object
      properties:
        total_playlists:
          type: integer
        public_playlists:
          type: integer
        total_items:
          type: integer

    SecurityStats:
      type: object
      properties:
        banned_ips:
          type: integer
        whitelisted_ips:
          type: integer
        blacklisted_ips:
          type: integer
        active_rate_limits:
          type: integer
        total_blocks_today:
          type: integer

    IPEntry:
      type: object
      properties:
        ip:
          type: string
        comment:
          type: string
        added_by:
          type: string
        added_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    BannedIP:
      type: object
      properties:
        ip:
          type: string
        banned_at:
          type: string
          format: date-time
