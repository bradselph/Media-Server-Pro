sonar.projectKey=bradselph_Media-Server-Pro-4
sonar.organization=bradselph

# ── Language / source roots ────────────────────────────────────────────────
# Go backend + TypeScript/Vue frontend
sonar.sources=api,cmd,internal,pkg,web/nuxt-ui

# Test files (Go *_test.go) — reported separately for coverage
sonar.tests=api,internal,pkg
sonar.test.inclusions=**/*_test.go

sonar.sourceEncoding=UTF-8

# ── Exclusions ─────────────────────────────────────────────────────────────
# - vendor/            Go module mirror — third-party code, not ours to fix
# - node_modules/      npm packages
# - .nuxt/ .output/    Nuxt build artifacts
# - openapi.generated  Codegen output from api_spec/openapi.yaml
# - audit screenshots  Binary/HTML report files, not source code
# - hls.js / bootstrap-icons  Vendored third-party JS/CSS assets
sonar.exclusions=\
  vendor/**,\
  web/nuxt-ui/node_modules/**,\
  web/nuxt-ui/.nuxt/**,\
  web/nuxt-ui/.output/**,\
  web/nuxt-ui/dist/**,\
  web/nuxt-ui/types/openapi.generated.ts,\
  web/static/js/hls.js,\
  web/static/css/bootstrap-icons.css,\
  docs/**,\
  **/*.min.js

# Skip generated/test-helper code from coverage metrics
sonar.coverage.exclusions=\
  vendor/**,\
  web/nuxt-ui/node_modules/**,\
  web/nuxt-ui/.nuxt/**,\
  web/nuxt-ui/types/openapi.generated.ts,\
  **/testutil/**,\
  **/testdata/**,\
  **/*_mock*.go

# ── Copy-paste detection exclusions ────────────────────────────────────────
# Vendor and generated files are expected to contain duplicated patterns
sonar.cpd.exclusions=\
  vendor/**,\
  web/nuxt-ui/node_modules/**,\
  web/nuxt-ui/types/openapi.generated.ts,\
  **/testutil/**
