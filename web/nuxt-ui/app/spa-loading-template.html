<!-- SPA loading splash. Nuxt auto-detects app/spa-loading-template.html and inlines
     it into #__nuxt in the generated index.html; Vue clears it when it mounts. It
     paints a brand-neutral, theme-aware spinner the moment the render-blocking
     entry.css loads, so the ssr:false shell is no longer a blank white screen until
     the bundle executes (~2.4s -> ~0.9s FCP). Rationale: see the perf commit.
     Keep this TINY — it ships inline in every served page. Brand-neutral because the
     brand name is a deploy-time runtime value a static build can't read. -->
<style>
  .msp-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:var(--surface-page,#0d0d12)}
  .msp-splash svg{display:block}
  .msp-splash .msp-ring{transform-origin:center;animation:msp-spin .8s linear infinite}
  @keyframes msp-spin{to{transform:rotate(360deg)}}
</style>
<div class="msp-splash" role="status" aria-live="polite" aria-label="Loading">
  <svg width="46" height="46" viewBox="0 0 46 46" fill="none" aria-hidden="true">
    <circle cx="23" cy="23" r="20" stroke-width="4" stroke="color-mix(in srgb, var(--accent, #5b8def) 22%, transparent)"/>
    <circle class="msp-ring" cx="23" cy="23" r="20" fill="none" stroke-width="4" stroke-linecap="round" stroke-dasharray="34 200" stroke="var(--accent, #5b8def)"/>
  </svg>
</div>
